<body>
    <div class="container">
        <h1>🔧 Tester API - Xtreme Performance</h1>
        
        <div class="instructions">
            <strong>Instrucciones:</strong> Selecciona un endpoint y haz clic en "Enviar" para probar. 
            Primero debes hacer login para obtener un token, luego podrás usar los otros endpoints.
        </div>
        
        <div class="layout">
            <div class="card">
                <h2>📋 Endpoints</h2>
                <div class="endpoint-list">
                    <button class="endpoint-btn selected" onclick="setEndpoint('POST', '/public/api/index.php?resource=auth&action=login', {correo: 'admin@ejemplo.com', clave: 'admin'})">
                        🔐 POST /auth/login
                    </button>
                    <button class="endpoint-btn" onclick="setEndpoint('GET', '/public/api/index.php?resource=clientes')">
                        👥 GET /clientes
                    </button>
                    <button class="endpoint-btn" onclick="setEndpoint('GET', '/public/api/index.php?resource=vehiculos')">
                        🚗 GET /vehiculos
                    </button>
                    <button class="endpoint-btn" onclick="setEndpoint('GET', '/public/api/index.php?resource=ordenes')">
                        📝 GET /ordenes
                    </button>
                    <button class="endpoint-btn" onclick="setEndpoint('GET', '/public/api/index.php?resource=usuarios&action=perfil')">
                        👤 GET /usuarios/perfil
                    </button>
                    <button class="endpoint-btn" onclick="setEndpoint('GET', '/public/api/index.php?resource=status')">
                        ✅ GET /status
                    </button>
                </div>
            </div>
            
            <div class="card">
                <h2>📤 Solicitud</h2>
                
                <div class="form-group">
                    <label>Método</label>
                    <input type="text" id="method" value="POST" readonly style="background: #f5f5f5;">
                </div>
                
                <div class="form-group">
                    <label>URL</label>
                    <input type="text" id="url" value="/public/api/index.php?resource=auth&action=login">
                </div>
                
                <div class="form-group">
                    <label>Token (si aplica)</label>
                    <input type="text" id="token" placeholder="Se llenará automáticamente después del login">
                </div>
                
                <div class="form-group">
                    <label>Body (JSON)</label>
                    <textarea id="body">{"correo": "admin@ejemplo.com", "clave": "admin"}</textarea>
                </div>
                
                <button onclick="testAPI()" style="width: 100%;">📨 Enviar Solicitud</button>

        <div class="card" style="margin-top: 20px;">
            <h2>📥 Respuesta</h2>
            <div id="response">Aquí aparecerá la respuesta...</div>
        </div>
    </div>
    
    <script>
        const baseUrl = window.location.origin;
        
        function setEndpoint(method, url, body = null) {
            document.getElementById('method').value = method;
            document.getElementById('url').value = url;
            
            if (body) {
                document.getElementById('body').value = JSON.stringify(body, null, 2);
            } else {
                document.getElementById('body').value = '';
            }
            
            // Actualizar botón seleccionado
            document.querySelectorAll('.endpoint-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.classList.add('selected');
        }
        
        async function testAPI() {
            const method = document.getElementById('method').value;
            const url = document.getElementById('url').value;
            let token = document.getElementById('token').value;
            const bodyText = document.getElementById('body').value;
            
            const responseDiv = document.getElementById('response');
            responseDiv.textContent = 'Enviando solicitud...';
            
            try {
                const options = {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    }
                };
                
                if (token) {
                    options.headers['Authorization'] = `Bearer ${token}`;
                }
                
                if (method !== 'GET' && bodyText) {
                    try {
                        options.body = JSON.stringify(JSON.parse(bodyText));
                    } catch (e) {
                        responseDiv.innerHTML = '<span class="status-error">Error: JSON inválido</span>\n' + e.message;
                        return;
                    }
                }
                
                const fullUrl = baseUrl + url;
                const response = await fetch(fullUrl, options);
                const data = await response.json();
                
                // Guardar token si es un login exitoso
                if (data.success && data.data && data.data.token) {
                    document.getElementById('token').value = data.data.token;
                }
                
                const statusClass = response.ok ? 'status-ok' : 'status-error';
                responseDiv.innerHTML = `<span class="${statusClass}">Status: ${response.status} ${response.statusText}</span>\n\n${JSON.stringify(data, null, 2)}`;
                
            } catch (error) {
                responseDiv.innerHTML = `<span class="status-error">Error:</span>\n${error.message}`;
            }
        }
        
        // Permitir enviar con Enter en el textarea
        document.getElementById('body').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                testAPI();
            }
        });
    </script>
